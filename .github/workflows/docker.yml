name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # This ensures deployment ONLY happens if the build succeeds!

    steps:
      - name: SSH into EC2 and Deploy New Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop backend-app || true
            docker rm backend-app || true
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest
            docker image prune -f
            
            # Secure execution using the on-disk environment file
            docker run -d -p 5000:5000 \
              --env-file ~/app/config/.env \
              --name backend-app \
              ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest