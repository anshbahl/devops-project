name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # This ensures deployment ONLY happens if the build succeeds!

    steps:
      - name: SSH into EC2 and Deploy New Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop and remove the old running container so we can free up port 5000
            docker stop backend-app || true
            docker rm backend-app || true
            
            # Pull the brand new image from Docker Hub
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest
            
            # Clean up old dangling images to keep your EC2 free storage happy
            docker image prune -f
            
            # Spin up the new container flawlessly
            docker run -d -p 5000:5000 \
              -e MONGO_URI="mongodb+srv://user:anshbahl@cluster0.qlqny35.mongodb.net/?appName=Cluster0" \
              -e JWT_SECRET="secret123" \
              --name backend-app \
              ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest